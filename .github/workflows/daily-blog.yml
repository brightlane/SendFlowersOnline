name: Vulture 10K Daily Engine
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
concurrency:
  group: sendflowersonline-vulture
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  run-vulture-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      # Protect index.html before any generator runs
      - name: Snapshot protected index.html
        run: |
          if [ -f index.html ]; then
            cp index.html index.html.protected
            echo "✅ index.html snapshot saved"
          else
            echo "⚠️ No index.html found to protect"
          fi

      - name: Verify generator exists
        shell: bash
        run: |
          if [ ! -f vulture_generator_master.py ]; then
            echo "⚠️ vulture_generator_master.py not found — skipping content generation"
            echo "SKIP_GENERATOR=true" >> $GITHUB_ENV
          else
            echo "✅ Generator found"
            echo "SKIP_GENERATOR=false" >> $GITHUB_ENV
          fi

      - name: Execute Vulture Master Script (time-capped at 30 min)
        if: env.SKIP_GENERATOR == 'false'
        shell: bash
        run: |
          timeout 1800 python vulture_generator_master.py || {
            EXIT=$?
            if [ $EXIT -eq 124 ]; then
              echo "⏱️ Generator hit 30-min cap — partial output committed"
            else
              echo "❌ Generator exited with code $EXIT"
            fi
          }

      # Restore index.html so generator can never overwrite it
      - name: Restore protected index.html
        run: |
          if [ -f index.html.protected ]; then
            cp index.html.protected index.html
            rm index.html.protected
            echo "✅ index.html restored"
          fi

      - name: Git Status
        run: git status --short

      - name: Commit and Push Changes
        shell: bash
        run: |
          git config user.name "Vulture-Bot"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 300
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi
          git commit -m "Vulture Engine: $(date +'%Y-%m-%d') [Skip CI]"
          for i in 1 2 3; do
            git push origin main --progress && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
