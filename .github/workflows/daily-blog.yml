name: Vulture 10K Daily Engine

on:
  schedule:
    # Daily at 9 AM UTC
    - cron: "0 9 * * *"

  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: sendflowersonline-vulture
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-vulture-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        shell: bash
        run: |
          set -e

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: Verify generator exists
        shell: bash
        run: |
          if [ ! -f vulture_generator_master.py ]; then
            echo "❌ Missing vulture_generator_master.py"
            exit 1
          fi

      - name: Execute Vulture Master Script
        shell: bash
        run: |
          set -e
          python vulture_generator_master.py

      - name: Git Status
        run: git status

      - name: Commit and Push Changes
        shell: bash
        run: |
          set +e

          git config user.name "Vulture-Bot"
          git config user.email "actions@github.com"

          git add -A

          # Skip if no changes
          if git diff --cached --quiet; then
            echo "✅ No changes detected"
            exit 0
          fi

          git commit -m "Vulture Engine Sync: $(date +'%Y-%m-%d')"

          # Save local work safely
          git stash push --include-untracked || true

          # Pull latest remote changes
          git pull --rebase origin main || true

          # Restore local changes
          git stash pop || true

          git add -A

          # Re-commit if needed after stash pop
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit || true
          fi

          # Push safely
          git push origin HEAD:main

          PUSH_EXIT=$?

          if [ $PUSH_EXIT -ne 0 ]; then
            echo ""
            echo "❌ Push failed"
            echo ""
            echo "Possible causes:"
            echo "- GitHub account suspended"
            echo "- Invalid repository permissions"
            echo "- Branch protection rules"
            echo "- Token access restrictions"
            echo "- GitHub outage"
            echo ""
            echo "Workflow finished gracefully."
            exit 0
          fi

          echo "✅ Push successful"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
