<!-- Exit-intent urgency popup with dynamic urgency -->
<div id="exit-popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);color:#fff;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:20px;z-index:9999;">
  <div style="background:#fff;color:#004b98;padding:30px;border-radius:16px;max-width:400px;">
    <h2 style="margin-bottom:16px;">Wait! Don’t leave yet!</h2>
    <p style="margin-bottom:16px;">Hurry! Only <span id="bouquets-left">12</span> bouquets left for today. Fast delivery guaranteed!</p>
    <a href="https://www.floristone.com/index.cfm?source_id=aff&AffiliateID=2013017799" 
       style="display:inline-block;background:#e20613;color:#fff;padding:12px 28px;border-radius:24px;font-weight:700;text-decoration:none;">
      Send Flowers Now
    </a>
  </div>
</div>

<script>
  let exitPopupShown = false;

  // Randomize remaining bouquets for urgency
  function randomBouquets() {
    return Math.floor(Math.random() * 10) + 5; // random 5–14
  }

  document.addEventListener('mouseout', function(e) {
    if (!exitPopupShown && e.clientY < 50) {
      document.getElementById('bouquets-left').textContent = randomBouquets();
      document.getElementById('exit-popup').style.display = 'flex';
      exitPopupShown = true;
    }
  });

  // Close popup if clicking outside the inner box
  document.getElementById('exit-popup').addEventListener('click', function(e){
    if(e.target.id === 'exit-popup') this.style.display='none';
  });
</script>
