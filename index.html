<script>
// Dynamic Exit Popup
const scenarios = [
  "birthday",
  "get-well",
  "anniversary",
  "funeral",
  "Mother’s Day",
  "Valentine’s Day",
  "Christmas",
  "Easter"
];

document.addEventListener('mouseout', function(e){
  if(e.clientY < 10){
    if(!document.getElementById('exit-popup')){
      // Pick a random scenario
      let scenario = scenarios[Math.floor(Math.random() * scenarios.length)];

      let popup = document.createElement('div');
      popup.id = 'exit-popup';
      popup.style.position='fixed';
      popup.style.top='0';
      popup.style.left='0';
      popup.style.width='100%';
      popup.style.height='100%';
      popup.style.background='rgba(0,0,0,0.6)';
      popup.style.display='flex';
      popup.style.alignItems='center';
      popup.style.justifyContent='center';
      popup.style.zIndex='9999';

      popup.innerHTML = `
        <div style="
          max-width:600px;
          padding:36px;
          border-radius:16px;
          background: linear-gradient(135deg, #004b98 0%, #e20613 100%);
          color:#fff;
          text-align:center;
          font-family: system-ui, sans-serif;
          box-shadow: 0 12px 30px rgba(0,0,0,0.3);
          animation: popupFadeIn 0.4s ease;
        ">
          <h2 style="margin-bottom:16px;font-size:1.5rem;">Wait! Don’t Leave Yet!</h2>
          <p style="margin-bottom:24px;font-size:1rem;line-height:1.4;">
            Send ${scenario} flowers online now before it’s too late! Fast delivery available to Canada & USA.
          </p>
          <a href="https://www.floristone.com/index.cfm?source_id=aff&AffiliateID=2013017799" target="_blank" rel="noopener" style="
            display:inline-block;
            padding:14px 32px;
            border-radius:32px;
            background:#fff;
            color:#004b98;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:0.05em;
            font-size:1rem;
            transition: all 0.3s ease;
          " onmouseover="this.style.transform='scale(1.05)';" onmouseout="this.style.transform='scale(1)';">Order Flowers Now</a>
        </div>
      `;

      document.body.appendChild(popup);

      // Close popup on click outside
      popup.addEventListener('click', function(e){
        if(e.target === popup) popup.remove();
      });
    }
  }
});

// Simple fade-in animation
let style = document.createElement('style');
style.innerHTML = `
@keyframes popupFadeIn {
  from {opacity:0; transform: scale(0.9);}
  to {opacity:1; transform: scale(1);}
}`;
document.head.appendChild(style);
</script>
